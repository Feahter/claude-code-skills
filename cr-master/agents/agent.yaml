interface:
  display_name: "CR 大师"
  short_description: "审查本地 git 变更（工作区 / 暂存区 / commit / 分支对比），P0-P3 分级输出 SOLID / 安全 / 竞态 / 错误处理 / 性能 / 边界条件问题；审查优先、等用户确认再改"
  default_prompt: "审查当前本地 git 变更，先提炼改动意图，再按 P0-P3 分级输出中文结构化报告，只审查不修改，等我确认后再执行修复。"

# Agent-agnostic skill - works with any LLM provider.
